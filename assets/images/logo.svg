<svg width="210" height="40" viewBox="0 0 210 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Truck Icon with motion lines -->
  <g id="truck-icon">
    <!-- Speed/motion lines (left side) -->
    <path d="M8 14h6v2H8z" fill="#FF6B35" opacity="0.4"/>
    <path d="M6 18h8v2H6z" fill="#FF6B35" opacity="0.3"/>
    <path d="M8 22h6v2H8z" fill="#FF6B35" opacity="0.4"/>
    
    <!-- Main truck body -->
    <rect x="18" y="14" width="18" height="12" rx="1" fill="#FF6B35"/>
    
    <!-- Truck cargo section -->
    <path d="M36 16h8l5 6v4h-13v-10z" fill="#FF6B35"/>
    
    <!-- Truck cabin/windshield -->
    <rect x="20" y="16" width="6" height="4" rx="0.5" fill="#FF8C61"/>
    
    <!-- Windshield reflection -->
    <rect x="21" y="17" width="4" height="2" rx="0.3" fill="white" opacity="0.3"/>
    
    <!-- Truck details/lines -->
    <line x1="36" y1="18" x2="36" y2="24" stroke="#FF8C61" stroke-width="1.5"/>
    <line x1="40" y1="20" x2="46" y2="24" stroke="#FF8C61" stroke-width="1"/>
    
    <!-- Front wheel -->
    <circle cx="24" cy="28" r="4" fill="#FF6B35"/>
    
    <!-- Back wheel -->
    <circle cx="44" cy="28" r="4" fill="#FF6B35"/>
    
    <!-- Undercarriage -->
    <rect x="20" y="26" width="28" height="1" fill="#2A2D34" opacity="0.3"/>
  </g>
  
  <!-- TruckBite Text -->
  <text x="62" y="28" font-family="'Poppins', 'Arial Black', sans-serif" font-size="24" font-weight="800" fill="#FF6B35" letter-spacing="-0.5">TruckBite</text>
</svg>
