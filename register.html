<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruckBite - Register</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-top-controls">
            <button class="icon-btn rtl-toggle-btn"><i class="fa-solid fa-language"></i></button>
            <button class="icon-btn theme-toggle-btn"><i class="fa-solid fa-moon"></i></button>
        </div>
        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html" style="text-decoration: none;">
                    <img src="assets/images/logo.svg" alt="TruckBite" style="height: 36px;">
                </a>
            </div>
            <div class="auth-header" style="text-align: center; margin-bottom: 32px;">
                <h4 style="font-size: 2rem; color: var(--text-dark);">Join TruckBite</h4>
                <p style="color: var(--text-light); margin-top: 8px;">Create your fleet manager account</p>
            </div>

            <form id="register-form">
                <div class="form-group"><label>Full Name</label><input type="text" placeholder="Your Name" required>
                </div>
                <div class="form-group"><label>Email Address</label><input type="email" placeholder="Email" required>
                </div>
                <div class="form-group"><label>Password</label><input type="password" placeholder="Password" required>
                </div>
                <div class="form-group"><label>Confirm Password</label><input type="password"
                        placeholder="Repeat Password" required></div>
                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I accept the Terms & Conditions</label>
                </div>
                <button type="submit" id="register-btn" class="btn btn-primary btn-full">Register</button>
            </form>
            <div class="auth-divider">OR</div>
            <button class="social-btn btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"
                    style="width: 18px;">
                Continue with Google
            </button>
            <button class="social-btn btn-apple">
                <i class="fa-brands fa-apple" style="font-size: 20px;"></i>
                Continue with Apple
            </button>
            <button class="social-btn btn-email">
                <i class="fa-regular fa-envelope" style="font-size: 20px;"></i>
                Continue with Email
            </button>
            <div class="auth-links">Already have an account? <a href="login.html">Login</a></div>
        </div>
    </div>
    <script src="js/rtl-toggle.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
