<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruckBite - Analytics</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .analytics-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }
        @media (max-width: 768px) {
            .analytics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <header class="dashboard-topbar">
            <div class="topbar-left">
                <button class="dashboard-hamburger" aria-label="Toggle Menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <a href="index.html" class="logo" style="text-decoration: none;">
                    <img src="assets/images/logo.svg" alt="TruckBite" style="height: 36px;">
                </a>
            </div>
            <div class="topbar-right">
                <button class="icon-btn rtl-toggle-btn"><i class="fa-solid fa-globe"></i></button>
                <button class="icon-btn theme-toggle-btn"><i class="fa-solid fa-moon"></i></button>
                <div class="user-profile-dropdown">TB</div>
            </div>
        </header>

        <div class="dashboard-body">
            <nav class="dashboard-sidebar">
                <ul class="sidebar-menu">
                    <li><a href="overview.html" class="sidebar-item"><i class="fa-solid fa-border-all"></i> Overview</a></li>
                    <li><a href="trucks.html" class="sidebar-item"><i class="fa-solid fa-truck"></i> Truck Management</a></li>
                    <li><a href="gps.html" class="sidebar-item"><i class="fa-solid fa-location-dot"></i> GPS Tracking</a></li>
                    <li><a href="analytics.html" class="sidebar-item active"><i class="fa-solid fa-chart-line"></i> Analytics</a></li>
                </ul>
                <ul class="sidebar-menu sidebar-footer">
                    <li><a href="index.html" class="sidebar-item logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
                </ul>
            </nav>
            
            
            

            <main class="dashboard-main">
                <div class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <div><h1>Analytics</h1><p>Fleet performance and revenue reports</p></div>
                    <select style="padding: 12px; border-radius: 8px; border: 1px solid var(--border-color);">
                        <option>Last 30 Days</option>
                        <option>Last Quarter</option>
                        <option>Year to Date</option>
                    </select>
                </div>

                <div class="stats-grid">
                    <div class="dash-card stat-card">
                        <div class="stat-label">Total Revenue</div>
                        <div class="stat-value">$124,500</div>
                    </div>
                    <div class="dash-card stat-card">
                        <div class="stat-label">Avg Order Value</div>
                        <div class="stat-value">$18.40</div>
                    </div>
                    <div class="dash-card stat-card">
                        <div class="stat-label">Customer Rating</div>
                        <div class="stat-value">4.8/5</div>
                    </div>
                    <div class="dash-card stat-card">
                        <div class="stat-label">Fuel Efficiency</div>
                        <div class="stat-value">12 mpg</div>
                    </div>
                </div>

                <div class="analytics-grid">
                    <div class="dash-card">
                        <h3>Revenue Trend</h3>
                        <div style="height: 300px; display: flex; align-items: flex-end; gap: 8px; padding-top: 40px;">
                            <div style="flex: 1; height: 40%; background: var(--primary); border-radius: 4px;"></div>
                            <div style="flex: 1; height: 60%; background: var(--primary); border-radius: 4px;"></div>
                            <div style="flex: 1; height: 80%; background: var(--primary); border-radius: 4px;"></div>
                            <div style="flex: 1; height: 50%; background: var(--primary); border-radius: 4px;"></div>
                            <div style="flex: 1; height: 90%; background: var(--primary); border-radius: 4px;"></div>
                            <div style="flex: 1; height: 75%; background: var(--primary); border-radius: 4px;"></div>
                            <div style="flex: 1; height: 100%; background: var(--primary); border-radius: 4px;"></div>
                        </div>
                    </div>
                    <div class="dash-card">
                        <h3>Top Cuisine</h3>
                        <div style="margin-top: 40px; display: flex; flex-direction: column; gap: 24px;">
                            <div>
                                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span>American</span><span>45%</span></div>
                                <div style="height: 8px; width: 100%; background: #eee; border-radius: 4px;"><div style="width: 45%; height: 100%; background: var(--primary); border-radius: 4px;"></div></div>
                            </div>
                            <div>
                                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span>Mexican</span><span>30%</span></div>
                                <div style="height: 8px; width: 100%; background: #eee; border-radius: 4px;"><div style="width: 30%; height: 100%; background: #3B82F6; border-radius: 4px;"></div></div>
                            </div>
                            <div>
                                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span>Thai</span><span>25%</span></div>
                                <div style="height: 8px; width: 100%; background: #eee; border-radius: 4px;"><div style="width: 25%; height: 100%; background: #10B981; border-radius: 4px;"></div></div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="js/rtl-toggle.js"></script><script src="js/script.js"></script>
</body>
</html>
